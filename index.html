<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="吃药记录">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>吃药记录</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .medicine-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .medicine-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .medicine-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: scale(1.02);
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        .btn-success {
            background: #51cf66;
            color: white;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .hidden {
            display: none;
        }
        .record-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .record-item:last-child {
            border-bottom: none;
        }
        .record-date {
            font-size: 14px;
            color: #333;
        }
        .record-time {
            font-size: 12px;
            color: #999;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .summary-number {
            font-size: 28px;
            font-weight: bold;
        }
        .summary-label {
            font-size: 12px;
            opacity: 0.8;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .last-taken {
            font-size: 12px;
            color: #51cf66;
            margin-top: 4px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .category-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        .category-处方药 { background: #fff3bf; color: #e67700; }
        .category-保健品 { background: #d0ebff; color: #1864ab; }
        .category-其他 { background: #e9ecef; color: #495057; }
        .photo-upload {
            margin-bottom: 12px;
        }
        .photo-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .photo-btn {
            flex: 1;
            padding: 12px;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            background: #f8f9fa;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .photo-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .photo-input {
            display: none;
        }
        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .photo-item {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }
        .photo-remove {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
        }
        .medicine-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .medicine-photo {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .medicine-photo:hover {
            transform: scale(1.05);
        }
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        .image-viewer.show {
            display: flex;
        }
        .image-viewer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .image-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
        }
        /* 日历样式 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .calendar-nav {
            display: flex;
            gap: 8px;
        }
        .calendar-nav button {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .calendar-nav button:hover {
            background: #667eea;
            color: white;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        .calendar-weekday {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 8px 0;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            font-size: 14px;
        }
        .calendar-day:hover {
            background: #f0f0f0;
        }
        .calendar-day.other-month {
            color: #ccc;
        }
        .calendar-day.today {
            background: #667eea;
            color: white;
        }
        .calendar-day.has-records {
            font-weight: 600;
        }
        .calendar-day.has-records::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: #51cf66;
            border-radius: 50%;
        }
        .calendar-day.today.has-records::after {
            background: white;
        }
        .calendar-day.selected {
            background: #764ba2;
            color: white;
        }
        .day-detail {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .day-detail-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        .day-record {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .day-record-name {
            font-size: 14px;
            color: #333;
        }
        .day-record-time {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💊 吃药记录</h1>

        <div class="tabs">
            <button class="tab active" onclick="showTab('medicines')">我的药品</button>
            <button class="tab" onclick="showTab('records')">服药记录</button>
            <button class="tab" onclick="showTab('add')">添加药品</button>
        </div>

        <!-- 药品列表 -->
        <div id="medicines-tab" class="card">
            <div class="summary" id="summary"></div>
            <div id="medicine-list"></div>
        </div>

        <!-- 服药记录 -->
        <div id="records-tab" class="card hidden">
            <div class="calendar-header">
                <div class="calendar-title" id="calendar-title">2024年3月</div>
                <div class="calendar-nav">
                    <button onclick="prevMonth()">‹</button>
                    <button onclick="nextMonth()">›</button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <div class="calendar-weekday">日</div>
                <div class="calendar-weekday">一</div>
                <div class="calendar-weekday">二</div>
                <div class="calendar-weekday">三</div>
                <div class="calendar-weekday">四</div>
                <div class="calendar-weekday">五</div>
                <div class="calendar-weekday">六</div>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
            <div class="day-detail" id="day-detail"></div>
        </div>

        <!-- 添加药品 -->
        <div id="add-tab" class="card hidden">
            <div class="section-title">添加新药品</div>
            <input type="text" id="medicine-name" placeholder="药品名称">
            <textarea id="medicine-description" placeholder="服用说明（如：每日3次，每次1片，饭后服用）"></textarea>

            <div class="photo-upload">
                <div class="photo-btns">
                    <label class="photo-btn" onclick="triggerCamera()">
                        📷 拍照
                    </label>
                    <label class="photo-btn" onclick="triggerGallery()">
                        🖼️ 相册
                    </label>
                </div>
                <input type="file" id="camera-input" class="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
                <input type="file" id="gallery-input" class="photo-input" accept="image/*" multiple onchange="handlePhoto(event)">
                <div class="photo-preview" id="photo-preview"></div>
            </div>

            <button class="btn btn-primary" onclick="addMedicine()">添加药品</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="image-viewer" onclick="closeViewer(event)">
        <button class="image-viewer-close" onclick="closeViewer()">×</button>
        <img id="viewer-image" src="" alt="查看图片">
    </div>

    <script>
        // 预置药品数据
        const defaultMedicines = [
            {
                id: 1,
                name: '盐酸二甲双胍片',
                description: '规格：0.25mg*100片/盒\n用法：每日2次，每次2片，口服',
                category: '处方药',
                photos: [],
                createdAt: new Date().toISOString()
            },
            {
                id: 2,
                name: '非诺贝特胶囊(力平之)',
                description: '规格：0.2g*10片/盒\n用法：每日1次，每次1粒，口服',
                category: '处方药',
                photos: [],
                createdAt: new Date().toISOString()
            },
            {
                id: 3,
                name: '非布司他片(瑞扬)',
                description: '规格：40mg/片*10片/盒\n用法：每日1次，每次0.5片，口服',
                category: '处方药',
                photos: [],
                createdAt: new Date().toISOString()
            },
            {
                id: 4,
                name: '多烯磷脂酰胆碱胶囊(易善复)',
                description: '规格：228mg*24粒/盒\n用法：每日3次，每次1粒，口服',
                category: '处方药',
                photos: [],
                createdAt: new Date().toISOString()
            },
            {
                id: 5,
                name: '脂必泰胶囊',
                description: '规格：0.24g/粒*14粒/盒\n用法：每日2次，每次1粒，口服',
                category: '处方药',
                photos: [],
                createdAt: new Date().toISOString()
            }
        ];

        // 数据存储
        let medicines = JSON.parse(localStorage.getItem('medicines') || 'null');
        let records = JSON.parse(localStorage.getItem('records') || '[]');

        // 首次使用时初始化预置药品
        if (medicines === null) {
            medicines = defaultMedicines;
            saveMedicines();
        }

        // 临时存储添加药品时的图片
        let pendingPhotos = [];
        let viewerImages = [];
        let viewerIndex = 0;

        // 触发拍照
        function triggerCamera() {
            document.getElementById('camera-input').click();
        }

        // 触发相册选择
        function triggerGallery() {
            document.getElementById('gallery-input').click();
        }

        // 处理图片上传
        function handlePhoto(event) {
            const files = event.target.files;
            if (!files.length) return;

            Array.from(files).forEach(file => {
                compressImage(file, (base64) => {
                    pendingPhotos.push(base64);
                    renderPhotoPreview();
                });
            });
            event.target.value = '';
        }

        // 压缩图片
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxSize = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > maxSize) {
                        height = (height * maxSize) / width;
                        width = maxSize;
                    } else if (height > maxSize) {
                        width = (width * maxSize) / height;
                        height = maxSize;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    callback(base64);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 渲染图片预览
        function renderPhotoPreview() {
            const container = document.getElementById('photo-preview');
            container.innerHTML = pendingPhotos.map((photo, i) => `
                <div class="photo-item">
                    <img src="${photo}" onclick="openViewer([${pendingPhotos.map(p => "'" + p + "'").join(',')}], ${i})">
                    <button class="photo-remove" onclick="removePhoto(${i})">×</button>
                </div>
            `).join('');
        }

        // 删除预览图片
        function removePhoto(index) {
            pendingPhotos.splice(index, 1);
            renderPhotoPreview();
        }

        // 打开图片查看器
        function openViewer(images, index) {
            viewerImages = images;
            viewerIndex = index;
            document.getElementById('viewer-image').src = images[index];
            document.getElementById('image-viewer').classList.add('show');
            event.stopPropagation();
        }

        // 关闭图片查看器
        function closeViewer(e) {
            if (e && e.target !== document.getElementById('image-viewer')) return;
            document.getElementById('image-viewer').classList.remove('show');
        }

        // 显示标签页
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.remove('hidden');

            if (tab === 'medicines') renderMedicines();
            if (tab === 'records') renderRecords();
            if (tab === 'add') resetAddForm();
        }

        // 重置添加表单
        function resetAddForm() {
            if (editingPhotosMedicineId) return;
            document.getElementById('medicine-name').value = '';
            document.getElementById('medicine-description').value = '';
            pendingPhotos = [];
            renderPhotoPreview();
            const btn = document.querySelector('#add-tab .btn-primary');
            btn.textContent = '添加药品';
            btn.onclick = () => addMedicine();
        }

        // 渲染药品列表
        function renderMedicines() {
            const list = document.getElementById('medicine-list');
            const summary = document.getElementById('summary');

            const today = new Date().toDateString();
            const todayRecords = records.filter(r => new Date(r.time).toDateString() === today);
            const days = getConsecutiveDays();

            summary.innerHTML = `
                <div class="summary-item">
                    <div class="summary-number">${todayRecords.length}</div>
                    <div class="summary-label">今日服药次数</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number">${days}</div>
                    <div class="summary-label">连续服药天数</div>
                </div>
            `;

            if (medicines.length === 0) {
                list.innerHTML = '<div class="empty-state">还没有添加药品<br>点击"添加药品"开始</div>';
                return;
            }

            list.innerHTML = medicines.map((m, i) => {
                const lastTaken = getLastTaken(m.id);
                const photos = m.photos || [];
                const category = m.category || '其他';
                const photosHtml = photos.length > 0 ? `
                    <div class="medicine-photos">
                        ${photos.map((p, pi) => `
                            <img class="medicine-photo" src="${p}" onclick="openViewer([${photos.map(x => "'" + x + "'").join(',')}], ${pi})">
                        `).join('')}
                    </div>
                ` : '';

                return `
                    <div class="medicine-item">
                        <div class="medicine-name">
                            ${m.name}
                            <span class="category-tag category-${category}">${category}</span>
                        </div>
                        ${photosHtml}
                        <div class="medicine-desc">${m.description || '暂无说明'}</div>
                        ${lastTaken ? `<div class="last-taken">✓ 上次服用: ${lastTaken}</div>` : ''}
                        <div class="btn-group">
                            <button class="btn btn-success btn-small" onclick="takeMedicine(${m.id})">✓ 吃药打卡</button>
                            <button class="btn btn-small" style="background:#e0e0e0" onclick="editMedicine(${m.id})">编辑</button>
                            <button class="btn btn-small" style="background:#4dabf7;color:white" onclick="editPhotos(${m.id})">📷</button>
                            <button class="btn btn-danger btn-small" onclick="deleteMedicine(${m.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 获取上次服药时间
        function getLastTaken(medicineId) {
            const record = records.filter(r => r.medicineId === medicineId).sort((a, b) => new Date(b.time) - new Date(a.time))[0];
            if (!record) return null;
            const date = new Date(record.time);
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor(diff / (1000 * 60));

            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }

        // 计算连续服药天数
        function getConsecutiveDays() {
            if (records.length === 0) return 0;

            const dates = [...new Set(records.map(r => new Date(r.time).toDateString()))];
            dates.sort((a, b) => new Date(b) - new Date(a));

            let count = 0;
            let checkDate = new Date();
            checkDate.setHours(0, 0, 0, 0);

            for (let i = 0; i < dates.length; i++) {
                const recordDate = new Date(dates[i]);
                recordDate.setHours(0, 0, 0, 0);

                if (recordDate.getTime() === checkDate.getTime()) {
                    count++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (i === 0 && recordDate < checkDate) {
                    checkDate.setDate(checkDate.getDate() - 1);
                    if (recordDate.getTime() === checkDate.getTime()) {
                        count++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        break;
                    }
                } else {
                    break;
                }
            }

            return count;
        }

        // ========== 日历相关 ==========
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = null;

        // 渲染服药记录（日历视图）
        function renderRecords() {
            renderCalendar();
        }

        // 渲染日历
        function renderCalendar() {
            const titleEl = document.getElementById('calendar-title');
            const daysEl = document.getElementById('calendar-days');
            const detailEl = document.getElementById('day-detail');

            titleEl.textContent = `${currentYear}年${currentMonth + 1}月`;

            // 获取当月第一天和最后一天
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startWeekday = firstDay.getDay();
            const daysInMonth = lastDay.getDate();

            // 获取上个月的天数（用于填充）
            const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();

            // 统计每天的服药记录
            const recordsByDate = {};
            records.forEach(r => {
                const dateStr = new Date(r.time).toDateString();
                if (!recordsByDate[dateStr]) {
                    recordsByDate[dateStr] = [];
                }
                recordsByDate[dateStr].push(r);
            });

            const today = new Date();
            let html = '';

            // 上个月的日期
            for (let i = startWeekday - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            // 当月的日期
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateStr = date.toDateString();
                const isToday = date.toDateString() === today.toDateString();
                const hasRecords = recordsByDate[dateStr] && recordsByDate[dateStr].length > 0;
                const isSelected = selectedDate === dateStr;

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasRecords) classes += ' has-records';
                if (isSelected) classes += ' selected';

                html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${day}</div>`;
            }

            // 下个月的日期（填满6行）
            const totalCells = startWeekday + daysInMonth;
            const remainingCells = (7 - (totalCells % 7)) % 7;
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }

            daysEl.innerHTML = html;

            // 默认显示今天或选中日期的记录
            if (!selectedDate) {
                selectedDate = today.toDateString();
            }
            renderDayDetail(selectedDate);
        }

        // 选择日期
        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
        }

        // 渲染某天的详细记录（按药品归类）
        function renderDayDetail(dateStr) {
            const detailEl = document.getElementById('day-detail');
            const date = new Date(dateStr);
            const dateLabel = date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

            const dayRecords = records
                .filter(r => new Date(r.time).toDateString() === dateStr)
                .sort((a, b) => new Date(a.time) - new Date(b.time));

            if (dayRecords.length === 0) {
                detailEl.innerHTML = `
                    <div class="day-detail-title">${dateLabel}</div>
                    <div class="empty-state" style="padding: 20px;">当天无服药记录</div>
                `;
                return;
            }

            // 按药品归类
            const groupedByMedicine = {};
            dayRecords.forEach(r => {
                if (!groupedByMedicine[r.medicineId]) {
                    groupedByMedicine[r.medicineId] = [];
                }
                groupedByMedicine[r.medicineId].push(r);
            });

            detailEl.innerHTML = `
                <div class="day-detail-title">${dateLabel} (${dayRecords.length}次)</div>
                ${Object.entries(groupedByMedicine).map(([medicineId, recs]) => {
                    const medicine = medicines.find(m => m.id === parseInt(medicineId));
                    const times = recs.map(r => new Date(r.time).toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'}));
                    const recordIds = recs.map(r => r.id);
                    return `
                        <div class="day-record">
                            <div>
                                <div class="day-record-name">${medicine ? medicine.name : '已删除的药品'}</div>
                                <div class="day-record-time">${times.join('、')}</div>
                            </div>
                            <button class="btn btn-danger btn-small" onclick="deleteRecords(['${recordIds.join("','")}'])">删除</button>
                        </div>
                    `;
                }).join('')}
            `;
        }

        // 上个月
        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            selectedDate = null;
            renderCalendar();
        }

        // 下个月
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            selectedDate = null;
            renderCalendar();
        }

        // 添加药品
        function addMedicine() {
            const name = document.getElementById('medicine-name').value.trim();
            const description = document.getElementById('medicine-description').value.trim();

            if (!name) {
                showToast('请输入药品名称');
                return;
            }

            const medicine = {
                id: Date.now(),
                name,
                description,
                category: '其他',
                photos: [...pendingPhotos],
                createdAt: new Date().toISOString()
            };

            medicines.push(medicine);
            saveMedicines();

            document.getElementById('medicine-name').value = '';
            document.getElementById('medicine-description').value = '';
            pendingPhotos = [];
            renderPhotoPreview();

            showToast('药品添加成功');
            document.querySelector('.tab').click();
        }

        // 编辑药品
        function editMedicine(id) {
            const medicine = medicines.find(m => m.id === id);
            if (!medicine) return;

            const newName = prompt('药品名称:', medicine.name);
            if (newName === null) return;

            const newDesc = prompt('服用说明:', medicine.description);
            if (newDesc === null) return;

            medicine.name = newName.trim() || medicine.name;
            medicine.description = newDesc.trim();
            saveMedicines();
            renderMedicines();
            showToast('修改成功');
        }

        // 当前正在编辑图片的药品ID
        let editingPhotosMedicineId = null;

        // 编辑药品图片
        function editPhotos(id) {
            const medicine = medicines.find(m => m.id === id);
            if (!medicine) return;

            editingPhotosMedicineId = id;
            pendingPhotos = [...(medicine.photos || [])];

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('add-tab').classList.remove('hidden');

            document.getElementById('medicine-name').value = medicine.name;
            document.getElementById('medicine-description').value = medicine.description || '';
            renderPhotoPreview();

            const btn = document.querySelector('#add-tab .btn-primary');
            btn.textContent = '保存修改';
            btn.onclick = () => saveEditedMedicine();

            showToast('编辑模式：可添加或删除图片');
        }

        // 保存编辑后的药品
        function saveEditedMedicine() {
            if (!editingPhotosMedicineId) return;

            const medicine = medicines.find(m => m.id === editingPhotosMedicineId);
            if (!medicine) return;

            medicine.name = document.getElementById('medicine-name').value.trim() || medicine.name;
            medicine.description = document.getElementById('medicine-description').value.trim();
            medicine.photos = [...pendingPhotos];

            saveMedicines();

            editingPhotosMedicineId = null;
            pendingPhotos = [];
            document.getElementById('medicine-name').value = '';
            document.getElementById('medicine-description').value = '';
            renderPhotoPreview();

            const btn = document.querySelector('#add-tab .btn-primary');
            btn.textContent = '添加药品';
            btn.onclick = () => addMedicine();

            showToast('保存成功');
            document.querySelector('.tab').click();
        }

        // 删除药品
        function deleteMedicine(id) {
            if (!confirm('确定删除这个药品吗？')) return;

            medicines = medicines.filter(m => m.id !== id);
            saveMedicines();
            renderMedicines();
            showToast('已删除');
        }

        // 吃药打卡
        function takeMedicine(id) {
            const medicine = medicines.find(m => m.id === id);
            if (!medicine) return;

            const record = {
                id: Date.now().toString(),
                medicineId: id,
                time: new Date().toISOString()
            };

            records.push(record);
            saveRecords();
            renderMedicines();
            showToast(`已记录服用 ${medicine.name}`);
        }

        // 删除单条记录
        function deleteRecord(id) {
            if (!confirm('确定删除这条记录吗？')) return;

            records = records.filter(r => r.id !== id);
            saveRecords();
            renderCalendar();
            showToast('已删除');
        }

        // 删除多条记录（按药品归类删除）
        function deleteRecords(ids) {
            if (!confirm(`确定删除这 ${ids.length} 条记录吗？`)) return;

            records = records.filter(r => !ids.includes(r.id));
            saveRecords();
            renderCalendar();
            showToast(`已删除 ${ids.length} 条记录`);
        }

        // 保存数据
        function saveMedicines() {
            localStorage.setItem('medicines', JSON.stringify(medicines));
        }

        function saveRecords() {
            localStorage.setItem('records', JSON.stringify(records));
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 初始化
        renderMedicines();

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 注册成功'))
                    .catch(err => console.log('Service Worker 注册失败:', err));
            });
        }
    </script>
</body>
</html>
